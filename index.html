<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelly Lim — Portfolio</title>
<style>
  :root{
    --cream:#FAF9F6; --ink:#17161B; --ink-70:#4A4950; --ink-45:#8A8891; --line:#E4E2DD;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--cream); color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
  }
  .wrap{max-width:640px; margin:0 auto; padding:96px 24px;}
  .kicker{
    font-family:"SF Mono", "JetBrains Mono", ui-monospace, monospace;
    font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-45); margin:0 0 12px;
  }
  h1{font-size:clamp(28px,4vw,38px); font-weight:700; margin:0 0 40px; letter-spacing:-.01em;}
  .list{list-style:none; margin:0; padding:0;}
  .item{border-top:1px solid var(--line); padding:22px 0;}
  .item:last-child{border-bottom:1px solid var(--line);}
  .item a{
    display:block; text-decoration:none; color:inherit;
  }
  .item-title{font-size:19px; font-weight:600; margin:0 0 6px; transition:opacity .15s ease;}
  .item a:hover .item-title{opacity:.6;}
  .item-desc{font-size:14px; line-height:1.55; color:var(--ink-70); margin:0;}
</style>
</head>
<body>
  <div class="wrap">
    <p class="kicker">Kelly Lim · Portfolio</p>
    <h1>Case Studies</h1>
    <ul class="list">
      <li class="item">
        <a href="owl-trade/">
          <p class="item-title">Building Trust in the Age of AI</p>
          <p class="item-desc">Identity for AI Agents — Twilio's product for letting AI agents securely authenticate and act on a user's behalf, illustrated through a fictional trading app connecting to ChatGPT.</p>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
